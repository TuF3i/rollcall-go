services:
  edge-server:
    build:
      context: ../../
      dockerfile: Dockerfile.edge
    ports:
      - "${EDGE_HTTP_PORT:-8080}:${EDGE_HTTP_PORT:-8080}"
    volumes:
      - ./data:/app/data
    environment:
      - EDGE_USERNAME=${EDGE_USERNAME}
      - EDGE_PASSWORD=${EDGE_PASSWORD}
      - EDGE_CURRICULUM_API=${EDGE_CURRICULUM_API:-}
      - EDGE_CURRICULUM_PRE_MINUTES=${EDGE_CURRICULUM_PRE_MINUTES:-10}
      - EDGE_HTTP_PORT=${EDGE_HTTP_PORT:-8080}
      - EDGE_CENTER_SERVER_URL=${EDGE_CENTER_SERVER_URL:-wss://cqupt.ishub.top/api/rollcall/ws}
      - EDGE_CENTER_SERVER_SECRET=${EDGE_CENTER_SERVER_SECRET:-}
      - EDGE_AUTO_LOCATION_CHECKIN=${EDGE_AUTO_LOCATION_CHECKIN:-true}
      - EDGE_AUTO_NUMBER_CHECKIN=${EDGE_AUTO_NUMBER_CHECKIN:-true}
      - EDGE_ETCD_ENDPOINTS=${EDGE_ETCD_ENDPOINTS:-}
      - EDGE_ETCD_PREFIX=${EDGE_ETCD_PREFIX:-/rollcall}
      - POLL_DELAY=${POLL_DELAY:-30}
      - TG_BOT_TOKEN=${TG_BOT_TOKEN:-}
      - TG_CHAT_ID=${TG_CHAT_ID:-}
    restart: unless-stopped
