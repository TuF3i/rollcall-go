# ============================================================
# rollcall-go Helm Chart 全局配置
# ============================================================

# 镜像配置
image:
  registry: ""
  repository: rollcall-go
  tag: latest
  pullPolicy: IfNotPresent
  pullSecrets: []

# 全局名称前缀
nameOverride: ""
fullnameOverride: ""

# 持久化
persistence:
  size: 1Gi
  accessMode: ReadWriteOnce
  storageClass: ""
  existingClaim: ""

# Service 全局配置
service:
  type: ClusterIP
  # clusterIP:
  # nodePort:

# ============================================================
# Edge Server 实例列表
# ============================================================
# 每添加一个实例，就会自动创建对应的 Deployment、Service、ConfigMap、Secret、PVC
# 执行 helm upgrade 即可生效
#
# 示例：
# edge:
#   instances:
#     - name: "student-a"
#       config:
#         edgeUsername: "2024001"
#         edgePassword: "pass123"
#         curriculumApi: "https://..."
#         centerServerUrl: "wss://center.example.com/ws"
#     - name: "student-b"
#       config:
#         edgeUsername: "2024002"
#         edgePassword: "pass456"
#
# 完整配置字段见下方说明
# ============================================================
edge:
  # 容器端口（所有实例共用）
  servicePort: 8080

  # 实例列表
  instances: []
  # 每个实例支持以下字段：
  #   - name: string (必填，唯一标识)
  #     pollDelay: int (可选，轮询间隔秒数，默认 30)
  #     config:
  #       edgeUsername:          string (必填)
  #       edgePassword:          string (必填)
  #       curriculumApi:         string
  #       curriculumPreMinutes:  int (默认 10)
  #       centerServerUrl:      string
  #       centerServerSecret:   string
  #       autoLocationCheckin:  bool (默认 true)
  #       autoNumberCheckin:    bool (默认 true)
  #       tgBotToken:           string
  #       tgChatId:             string
  #       etcdEndpoints:        string
  #       etcdPrefix:           string (默认 /rollcall)
  #       apiMode:              string (默认 http，可选 rpc)
  #       rpcPort:              int (默认 8888)
