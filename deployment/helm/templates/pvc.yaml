{{- range .Values.edge.instances }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "rollcall-go.instance.name" (dict "root" $ "instance" .) }}-data
  labels:
    {{- include "rollcall-go.instance.labels" (dict "root" $ "instance" .) | nindent 4 }}
spec:
  accessModes:
    - {{ $.Values.persistence.accessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ $.Values.persistence.size | default "1Gi" }}
  {{- if $.Values.persistence.storageClass }}
  storageClassName: {{ $.Values.persistence.storageClass }}
  {{- end }}
{{- end }}
