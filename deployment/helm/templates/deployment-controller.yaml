apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rollcall-go.fullname" . }}-controller
  labels:
    {{- include "rollcall-go.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "rollcall-go.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        {{- include "rollcall-go.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: controller
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: controller
          image: {{ include "rollcall-go.image" (dict "registry" .Values.image.registry "repository" .Values.image.repository "tag" .Values.image.tag) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.controller.servicePort | default 8082 }}
              protocol: TCP
          env:
            - name: EDGE_ETCD_ENDPOINTS
              value: {{ .Values.controller.etcdEndpoints | quote }}
            {{- if .Values.controller.etcdPrefix }}
            - name: EDGE_ETCD_PREFIX
              value: {{ .Values.controller.etcdPrefix | quote }}
            {{- end }}
            - name: CONTROLLER_HTTP_PORT
              value: {{ .Values.controller.servicePort | default 8082 | quote }}
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
