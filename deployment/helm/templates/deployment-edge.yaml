{{- range .Values.edge.instances }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rollcall-go.instance.name" (dict "root" $ "instance" .) }}
  labels:
    {{- include "rollcall-go.instance.labels" (dict "root" $ "instance" .) | nindent 4 }}
    app.kubernetes.io/component: edge
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "rollcall-go.instance.selectorLabels" (dict "root" $ "instance" .) | nindent 6 }}
  template:
    metadata:
      annotations:
        rollcall.auto/config-hash: {{ .config | toString | sha256sum }}
      labels:
        {{- include "rollcall-go.instance.selectorLabels" (dict "root" $ "instance" .) | nindent 8 }}
    spec:
      {{- with $.Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: edge
          image: {{ include "rollcall-go.image" (dict "registry" $.Values.image.registry "repository" $.Values.image.repository "tag" $.Values.image.tag) }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $.Values.edge.servicePort | default 8080 }}
              protocol: TCP
            - name: rpc
              containerPort: {{ .config.rpcPort | default 8888 }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "rollcall-go.instance.name" (dict "root" $ "instance" .) }}-config
            - secretRef:
                name: {{ include "rollcall-go.instance.name" (dict "root" $ "instance" .) }}-secret
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "rollcall-go.instance.name" (dict "root" $ "instance" .) }}-data
{{- end }}
