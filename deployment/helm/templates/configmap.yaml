{{- range .Values.edge.instances }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rollcall-go.instance.name" (dict "root" $ "instance" .) }}-config
  labels:
    {{- include "rollcall-go.instance.labels" (dict "root" $ "instance" .) | nindent 4 }}
data:
  EDGE_HTTP_PORT: {{ $.Values.edge.servicePort | default 8080 | toString | quote }}
  EDGE_CURRICULUM_API: {{ .config.curriculumApi | default "" | quote }}
  EDGE_CURRICULUM_PRE_MINUTES: {{ .config.curriculumPreMinutes | default 10 | toString | quote }}
  EDGE_CENTER_SERVER_URL: {{ .config.centerServerUrl | default "" | quote }}
  EDGE_AUTO_LOCATION_CHECKIN: {{ .config.autoLocationCheckin | default true | toString | quote }}
  EDGE_AUTO_NUMBER_CHECKIN: {{ .config.autoNumberCheckin | default true | toString | quote }}
  POLL_DELAY: {{ .pollDelay | default 30 | toString | quote }}
  EDGE_ETCD_ENDPOINTS: {{ .config.etcdEndpoints | default "" | quote }}
  EDGE_ETCD_PREFIX: {{ .config.etcdPrefix | default "/rollcall" | quote }}
{{- end }}
